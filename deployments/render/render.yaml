# OpenStatus Render Deployment Configuration (Free Tier)
# This file defines the services for deploying OpenStatus on Render using free tier instances

databases:
  # PostgreSQL Database (Free Tier - 1GB limit, expires in 30 days)
  - name: openstatus-db
    plan: free
    # diskSizeGB: 1  # Free tier limit is 1GB

services:
  # Redis Cache (Free Tier - Key Value instance)
  # NOTE: Free Key Value is in-memory only and loses data on restart
  # Suitable for temporary caching but not for persistent data
  - type: keyvalue
    name: openstatus-redis
    plan: free
    ipAllowList: [] # Allow all IPs for now

  # API Server (Free Web Service - spins down after 15 minutes idle)
  - type: pserv
    name: openstatus-api
    env: docker
    repo: https://github.com/openstatushq/openstatus.git
    rootDir: apps/server
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://openstatus:${openstatus-db.POSTGRES_PASSWORD}@${openstatus-db.HOSTNAME}:${openstatus-db.PORT}/openstatus
      - key: REDIS_URL
        value: redis://:${openstatus-redis.REDIS_PASSWORD}@${openstatus-redis.HOSTNAME}:${openstatus-redis.PORT}
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      - key: SELF_HOST
        value: "true"

  # Background Workflows (Free Worker - spins down after 15 minutes idle)
  # NOTE: Workers on free tier spin down when idle, which may affect monitoring
  # Consider using web service with cron for more reliable background jobs
  - type: worker
    name: openstatus-workflows
    env: docker
    repo: https://github.com/openstatushq/openstatus.git
    rootDir: apps/workflows
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://openstatus:${openstatus-db.POSTGRES_PASSWORD}@${openstatus-db.HOSTNAME}:${openstatus-db.PORT}/openstatus
      - key: REDIS_URL
        value: redis://:${openstatus-redis.REDIS_PASSWORD}@${openstatus-redis.HOSTNAME}:${openstatus-redis.PORT}
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

  # Dashboard Web App (Free Web Service - spins down after 15 minutes idle)
  - type: web
    name: openstatus-dashboard
    env: docker
    repo: https://github.com/openstatushq/openstatus.git
    rootDir: apps/dashboard
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://openstatus:${openstatus-db.POSTGRES_PASSWORD}@${openstatus-db.HOSTNAME}:${openstatus-db.PORT}/openstatus
      - key: NEXT_PUBLIC_URL
        value: https://openstatus-dashboard.onrender.com
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        sync: false

  # Status Page Web App (Free Web Service - spins down after 15 minutes idle)
  - type: web
    name: openstatus-status-page
    env: docker
    repo: https://github.com/openstatushq/openstatus.git
    rootDir: apps/status-page
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://openstatus:${openstatus-db.POSTGRES_PASSWORD}@${openstatus-db.HOSTNAME}:${openstatus-db.PORT}/openstatus
      - key: NEXT_PUBLIC_URL
        value: https://openstatus-status-page.onrender.com
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        sync: false

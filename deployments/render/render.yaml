# OpenStatus Render Deployment Configuration
# This file defines the services for deploying OpenStatus on Render

databases:
  # PostgreSQL Database
  - name: openstatus-db
    plan: free
    diskSizeGB: 10

services:
  # Redis Cache
  - type: keyvalue
    name: openstatus-redis
    plan: free
    ipAllowList: [] # Allow all IPs for now

  # API Server
  - type: pserv
    name: openstatus-api
    env: docker
    repo: https://github.com/openstatushq/openstatus.git
    rootDir: apps/server
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://openstatus:${openstatus-db.POSTGRES_PASSWORD}@${openstatus-db.HOSTNAME}:${openstatus-db.PORT}/openstatus
      - key: REDIS_URL
        value: redis://:${openstatus-redis.REDIS_PASSWORD}@${openstatus-redis.HOSTNAME}:${openstatus-redis.PORT}
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      - key: SELF_HOST
        value: "true"

  # Background Workflows
  - type: worker
    name: openstatus-workflows
    env: docker
    repo: https://github.com/openstatushq/openstatus.git
    rootDir: apps/workflows
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://openstatus:${openstatus-db.POSTGRES_PASSWORD}@${openstatus-db.HOSTNAME}:${openstatus-db.PORT}/openstatus
      - key: REDIS_URL
        value: redis://:${openstatus-redis.REDIS_PASSWORD}@${openstatus-redis.HOSTNAME}:${openstatus-redis.PORT}
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

  # Dashboard Web App
  - type: web
    name: openstatus-dashboard
    env: docker
    repo: https://github.com/openstatushq/openstatus.git
    rootDir: apps/dashboard
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://openstatus:${openstatus-db.POSTGRES_PASSWORD}@${openstatus-db.HOSTNAME}:${openstatus-db.PORT}/openstatus
      - key: NEXT_PUBLIC_URL
        value: https://openstatus-dashboard.onrender.com
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        sync: false

  # Status Page Web App
  - type: web
    name: openstatus-status-page
    env: docker
    repo: https://github.com/openstatushq/openstatus.git
    rootDir: apps/status-page
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://openstatus:${openstatus-db.POSTGRES_PASSWORD}@${openstatus-db.HOSTNAME}:${openstatus-db.PORT}/openstatus
      - key: NEXT_PUBLIC_URL
        value: https://openstatus-status-page.onrender.com
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        sync: false

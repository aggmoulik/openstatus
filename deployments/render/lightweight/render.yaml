# OpenStatus Lightweight Render Deployment (Free Tier)
# This file defines a minimal deployment for status page functionality using free tier instances

databases:
  # PostgreSQL Database (Free Tier - 1GB limit, expires in 30 days)
  - name: openstatus-db
    plan: free
    diskSizeGB: 1  # Free tier limit is 1GB

services:
  # Dashboard (Lightweight - Free Web Service - spins down after 15 minutes idle)
  - type: web
    name: openstatus-dashboard
    env: docker
    repo: https://github.com/openstatushq/openstatus.git
    rootDir: apps/dashboard
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://openstatus:${openstatus-db.POSTGRES_PASSWORD}@${openstatus-db.HOSTNAME}:${openstatus-db.PORT}/openstatus
      - key: NEXT_PUBLIC_URL
        value: https://openstatus-dashboard.onrender.com
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      - key: SELF_HOST
        value: "true"
      - key: RESEND_API_KEY
        sync: false
